<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ringg AI Caller</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8C96A;
    --bg: #0a0a0a;
    --bg-card: #111111;
    --bg-input: #161616;
    --border: rgba(201,168,76,0.18);
    --border-hover: rgba(201,168,76,0.45);
    --text: #f0ece0;
    --text-muted: #7a7570;
    --text-dim: #4a4640;
    --success-bg: rgba(30,70,40,0.6);
    --success-border: rgba(60,160,80,0.4);
    --success-text: #6ee08a;
    --error-bg: rgba(70,20,20,0.6);
    --error-border: rgba(180,50,50,0.4);
    --error-text: #f08080;
    --info-bg: rgba(20,40,70,0.6);
    --info-border: rgba(50,100,180,0.4);
    --info-text: #80b0f0;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.6;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background-image:
      radial-gradient(ellipse 60% 40% at 50% -10%, rgba(201,168,76,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 30% at 80% 90%, rgba(201,168,76,0.04) 0%, transparent 60%);
  }

  .container { width: 100%; max-width: 420px; animation: fadeUp 0.6s ease both; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 2.5rem; }

  .logo-icon {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-card);
  }

  .logo-icon svg { width: 18px; height: 18px; stroke: var(--gold); fill: none; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  .logo-text { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; }
  .logo-text span { color: var(--gold); }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
  }

  .card-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--text); margin-bottom: 4px; letter-spacing: -0.01em; }
  .card-sub { font-size: 13px; color: var(--text-muted); margin-bottom: 2rem; }

  .field { margin-bottom: 1.25rem; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }

  .field input {
    width: 100%;
    background: var(--bg-input);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 14px;
    height: 46px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }

  .field input::placeholder { color: var(--text-dim); }
  .field input:focus { border-color: var(--border-hover); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }

  .divider { height: 1px; background: var(--border); margin: 1.75rem 0; }

  .call-btn {
    width: 100%; height: 52px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    background-size: 200% 100%;
    border: none; border-radius: 12px;
    font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600;
    color: #1a1200; letter-spacing: 0.03em;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: background-position 0.4s, transform 0.15s, opacity 0.2s;
  }

  .call-btn:hover:not(:disabled) { background-position: 100% 0; transform: translateY(-1px); }
  .call-btn:active:not(:disabled) { transform: scale(0.98) translateY(0); }
  .call-btn:disabled { opacity: 0.55; cursor: not-allowed; }
  .call-btn svg { width: 18px; height: 18px; stroke: #1a1200; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  .status { margin-top: 1rem; padding: 12px 14px; border-radius: 10px; font-size: 13px; display: none; align-items: flex-start; gap: 9px; line-height: 1.5; }
  .status.show { display: flex; }
  .status svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }
  .status.success { background: var(--success-bg); border: 1px solid var(--success-border); color: var(--success-text); }
  .status.success svg { stroke: var(--success-text); }
  .status.error { background: var(--error-bg); border: 1px solid var(--error-border); color: var(--error-text); }
  .status.error svg { stroke: var(--error-text); }
  .status.info { background: var(--info-bg); border: 1px solid var(--info-border); color: var(--info-text); }
  .status.info svg { stroke: var(--info-text); }

  .footer { margin-top: 1.5rem; text-align: center; font-size: 12px; color: var(--text-dim); }

  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 0.9s linear infinite; display: inline-block; }

  @keyframes pulse-ring {
    0%   { box-shadow: 0 0 0 0 rgba(201,168,76,0.35); }
    70%  { box-shadow: 0 0 0 10px rgba(201,168,76,0); }
    100% { box-shadow: 0 0 0 0 rgba(201,168,76,0); }
  }
  .calling-pulse { animation: pulse-ring 1.4s ease-out infinite; }
</style>
</head>
<body>

<div class="container">
  <div class="logo-row">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.19 2 2 0 012 .01h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
    </div>
    <div class="logo-text">Ringg <span>AI</span> Caller</div>
  </div>

  <div class="card">
    <div class="card-title">Make a call</div>
    <div class="card-sub">Enter details and hit call — Ringg AI does the rest</div>

    <div class="field">
      <label>Lead name</label>
      <input type="text" id="lead_name" placeholder="e.g. Rahul Sharma" autocomplete="off" />
    </div>

    <div class="field">
      <label>Phone number</label>
      <input type="tel" id="phone" placeholder="+919876543210" autocomplete="off" />
    </div>

    <div class="divider"></div>

    <button class="call-btn" id="call-btn" onclick="initiateCall()">
      <svg viewBox="0 0 24 24" id="btn-icon"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.19 2 2 0 012 .01h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      <span id="btn-text">Call now</span>
    </button>

    <div class="status" id="status">
      <svg id="status-icon" viewBox="0 0 24 24"></svg>
      <span id="status-msg"></span>
    </div>
  </div>

  <div class="footer">Powered by Inpixel Network &nbsp;·&nbsp; Ringg AI API</div>
</div>

<script>
  const ICONS = {
    check: '<polyline points="20 6 9 17 4 12"></polyline>',
    alert: '<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>',
    loader: '<line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line>'
  };

  function setStatus(type, iconKey, msg, spin) {
    const el = document.getElementById('status');
    const ico = document.getElementById('status-icon');
    const txt = document.getElementById('status-msg');
    el.className = 'status show ' + type;
    ico.innerHTML = ICONS[iconKey];
    ico.classList.toggle('spin', !!spin);
    txt.textContent = msg;
  }

  async function initiateCall() {
    const name = document.getElementById('lead_name').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name) { setStatus('error', 'alert', 'Please enter the lead name'); return; }
    if (!phone) { setStatus('error', 'alert', 'Please enter a phone number'); return; }

    const btn = document.getElementById('call-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');

    btn.disabled = true;
    btn.classList.add('calling-pulse');
    btnIcon.innerHTML = ICONS.loader;
    btnIcon.classList.add('spin');
    btnText.textContent = 'Connecting...';
    setStatus('info', 'loader', 'Initiating call via Ringg AI...', true);

    try {
      const res = await fetch('/call', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, phone })
      });

      const data = await res.json().catch(() => ({}));

      if (res.ok) {
        const callId = data.call_id || data.id || '';
        setStatus('success', 'check', `Call initiated to ${phone}!${callId ? ' ID: ' + callId : ''}`);
        document.getElementById('lead_name').value = '';
        document.getElementById('phone').value = '';
      } else {
        const errMsg = data.message || data.error || data.detail || `HTTP ${res.status}`;
        setStatus('error', 'alert', `Error: ${errMsg}`);
      }
    } catch (err) {
      setStatus('error', 'alert', 'Could not reach local server. Is it running?');
    } finally {
      btn.disabled = false;
      btn.classList.remove('calling-pulse');
      btnIcon.innerHTML = '<path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.01 1.19 2 2 0 012 .01h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>';
      btnIcon.classList.remove('spin');
      btnText.textContent = 'Call now';
    }
  }

  document.addEventListener('keydown', (e) => { if (e.key === 'Enter') initiateCall(); });
</script>
</body>
</html>
